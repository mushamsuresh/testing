version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    ACCOUNT_ID: 690404310507
    REPOSITORY_NAME: testing

phases:

  pre_build:
    commands:
      - echo "Checking AWS identity..."
      - aws sts get-caller-identity
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "Build started..."
      - docker build -t $REPOSITORY_NAME .   # ✅ FIX HERE
      - docker tag $REPOSITORY_NAME:latest $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$REPOSITORY_NAME:latest

  post_build:
    commands:
      - echo "Pushing image..."
      - docker push $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$REPOSITORY_NAME:latest
